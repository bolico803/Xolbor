<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xolbor Quantum Browser</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
    <div class="browser-container">
        <!-- Toolbar -->
        <header class="toolbar">
            <div class="nav-buttons">
                <button id="back-btn" title="Retour">
                    <i data-lucide="arrow-left"></i>
                </button>
                <button id="forward-btn" title="Suivant">
                    <i data-lucide="arrow-right"></i>
                </button>
                <button id="reload-btn" title="Actualiser">
                    <i data-lucide="refresh-cw"></i>
                </button>
                <button id="home-btn" title="Accueil">
                    <i data-lucide="home"></i>
                </button>
            </div>

            <div class="url-bar-container">
                <i data-lucide="lock" style="width: 14px; opacity: 0.5;"></i>
                <input type="text" id="url-input" placeholder="Rechercher ou saisir une adresse web" value="xolbor.ma">
            </div>

            <div class="menu-buttons">
                <button id="bookmark-btn" title="Ajouter aux favoris">
                    <i data-lucide="star"></i>
                </button>
                <button id="history-btn" title="Historique">
                    <i data-lucide="history"></i>
                </button>
            </div>
        </header>

        <!-- Bookmarks Bar -->
        <div class="bookmarks-bar">
            <div class="bookmark" data-url="xolbor.ma">
                <i data-lucide="shield-check" style="width: 12px;"></i> Xolbor.ma
            </div>
            <div class="bookmark" data-url="xolbor.com">
                <i data-lucide="globe" style="width: 12px;"></i> Xolbor.com
            </div>
        </div>

        <!-- Main Content -->
        <main class="browser-content">
            <div id="loader" class="loader hidden"></div>
            <iframe id="browser-iframe" src="http://localhost:5173"></iframe>
        </main>
    </div>

    <script src="main.js"></script>
    <script>
        // Initialize Lucide icons
        lucide.createIcons();
    </script>
</body>

</html>
